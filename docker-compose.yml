services:
  medical-triage-agent:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: medical-triage-agent
    ports:
      - "7863:7863"
    volumes:
      - ./kb_docs:/app/kb_docs:ro
      - ./temp_summary:/app/temp_summary
    env_file:
      - .env
    restart: unless-stopped